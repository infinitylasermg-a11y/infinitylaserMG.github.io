<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinity Laser</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #000;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 100px;
      margin-bottom: 10px;
    }

    .galeria {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .galeria h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
    }

    .card p {
      padding: 10px;
      margin: 0;
    }

    .btn {
      display: block;
      background: #25d366;
      color: white;
      text-align: center;
      padding: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #1eb85a;
    }
  </style>
</head>
<body>

  <header>
    <img src="img2/logo.png" alt="Logo Infinity Laser" class="logo">
    <h1>Infinity Laser</h1>
    <p>Corte láser y personalizados</p>
  </header>

  <section class="galeria">
    <h2>Galería de trabajos</h2>

    <div class="grid">

      <div class="card">
        <img src="img2/p2.jpeg" alt="Figura decorativa para eventos">
        <p>Figura decorativa para eventos</p>
        <a class="btn" href="https://wa.me/573138274878?text=Hola%20quiero%20cotizar%20esta%20figura%20decorativa">Cotizar</a>
      </div>

      <div class="card">
        <img src="img2/p3.jpeg" alt="Reloj personalizado">
        <p>Reloj personalizado</p>
        <a class="btn" href="https://wa.me/573138274878?text=Hola%20quiero%20cotizar%20este%20reloj%20personalizado">Cotizar</a>
      </div>

      <div class="card">
        <img src="img2/p4.jpeg" alt="Diseño grabado láser">
        <p>Diseño grabado láser</p>
        <a class="btn" href="https://wa.me/573138274878?text=Hola%20quiero%20cotizar%20este%20diseño%20grabado">Cotizar</a>
      </div>

      <div class="card">
        <img src="img2/p5.jpeg" alt="Reloj para negocio">
        <p>Reloj para negocio</p>
        <a class="btn" href="https://wa.me/573138274878?text=Hola%20quiero%20cotizar%20este%20reloj%20para%20negocio">Cotizar</a>
      </div>

      <div class="card">
        <img src="img2/p6.jpeg" alt="Diseño personalizado">
        <p>Diseño personalizado</p>
        <a class="btn" href="https://wa.me/573138274878?text=Hola%20quiero%20cotizar%20este%20diseño%20personalizado">Cotizar</a>
      </div>

      <div class="card">
        <img src="img2/p7.jpeg" alt="Trabajo decorativo personalizado">
        <p>Trabajo decorativo personalizado</p>
        <a class="btn" href="https://wa.me/573138274878?text=Hola%20quiero%20cotizar%20este%20trabajo%20decorativo">Cotizar</a>
      </div>

    </div>
  </section>

</body>
</html>
