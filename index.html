.galeria{

.grid{

}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.card p{
  padding:10px;
}

/* BOTON */
.btn{
  display:block;
  background:#25d366;
  color:white;
  text-align:center;
  padding:10px;
  text-decoration:none;
}
</style>
