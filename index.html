<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Laser</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

/* HEADER */
header {
  background: black;
  color: white;
  text-align: center;
  padding: 20px;
}

/* ESPACIO DEL LOGO */
.logo-container {
  background: white;
  width: 120px;
  height: 120px;
  margin: 0 auto 10px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.logo-container img {
  width: 80px;
}

/* GALERIA */
.galeria {
  padding: 20px;
  text-align: center;
}

.galeria h2 {
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.card p {
  padding: 10px;
  font-size: 14px;
}
</style>

</head>
<body>

<header>

  <!-- ESPACIO DEL LOGO -->
  <div class="logo-container">
    <img src="img2/p00.png" alt="Logo Infinity Laser">
  </div>

  <h1>Infinity Laser</h1>
  <p>Cortes y diseños personalizados en láser</p>

</header>

<section class="galeria">
  <h2>Galería de trabajos</h2>

  <div class="grid">

    <div class="card">
      <img src="img2/p5.jpeg">
      <p>Diseño en madera personalizado</p>
    </div>

    <div class="card">
      <img src="img2/p2.jpeg">
      <p>Figura decorativa en MDF</p>
    </div>

    <div class="card">
      <img src="img2/p3.jpeg">
      <p>Reloj personalizado</p>
    </div>

    <div class="card">
      <img src="img2/p4.jpeg">
      <p>Diseño grabado láser</p>
    </div>

  </div>
</section>

</body>
</html>
