<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinity Laser</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --fondo: linear-gradient(135deg, #fff7f0, #ffe8f3, #eef7ff);
      --principal: #ff4d6d;
      --secundario: #7b2cbf;
      --acento: #ffb703;
      --verde: #25d366;
      --texto: #222;
      --blanco: #ffffff;
      --sombra: 0 10px 25px rgba(0, 0, 0, 0.12);
      --radio: 18px;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--fondo);
      color: var(--texto);
      line-height: 1.5;
    }

    header {
      background: linear-gradient(135deg, #111, #3a0ca3, #ff006e);
      color: white;
      text-align: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }

    header::before,
    header::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      animation: flotar 8s infinite ease-in-out;
    }

    header::before {
      width: 180px;
      height: 180px;
      top: -50px;
      left: -40px;
    }

    header::after {
      width: 220px;
      height: 220px;
      bottom: -70px;
      right: -60px;
      animation-delay: 2s;
    }

    @keyframes flotar {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(15px); }
    }

    .logo-container {
      background: white;
      width: 140px;
      height: 140px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      border: 5px solid rgba(255,255,255,0.3);
      animation: zoomLogo 2s ease;
    }

    .logo-container img {
      width: 90px;
      max-width: 100%;
      object-fit: contain;
    }

    @keyframes zoomLogo {
      from {
        transform: scale(0.7);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    header p {
      font-size: 1.05rem;
      opacity: 0.95;
    }

    .galeria {
      max-width: 1250px;
      margin: auto;
      padding: 40px 20px 60px;
    }

    .titulo-seccion {
      text-align: center;
      font-size: 2rem;
      color: var(--secundario);
      margin-bottom: 30px;
    }

    .categoria {
      margin-bottom: 45px;
      animation: aparecer 1s ease;
    }

    .categoria h3 {
      display: inline-block;
      background: linear-gradient(90deg, var(--principal), var(--acento));
      color: white;
      padding: 10px 18px;
      border-radius: 999px;
      margin-bottom: 20px;
      box-shadow: var(--sombra);
      font-size: 1.1rem;
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
    }

    .card {
      background: rgba(255,255,255,0.95);
      border-radius: var(--radio);
      overflow: hidden;
      box-shadow: var(--sombra);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      position: relative;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 18px 35px rgba(0,0,0,0.18);
    }

    .card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
      background: #f3f3f3;
    }

    .card:hover img {
      transform: scale(1.05);
    }

    .card-content {
      padding: 15px;
    }

    .card-content h4 {
      color: var(--principal);
      margin-bottom: 8px;
      font-size: 1.05rem;
    }

    .card-content p {
      font-size: 14px;
      color: #444;
      min-height: 55px;
      margin-bottom: 14px;
    }

    .btn-wsp {
      display: inline-block;
      width: 100%;
      text-align: center;
      background: linear-gradient(90deg, #25d366, #1ebe5d);
      color: white;
      padding: 12px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .btn-wsp:hover {
      transform: scale(1.03);
      opacity: 0.95;
    }

    .wsp-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 62px;
      height: 62px;
      background: #25d366;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      animation: pulso 1.8s infinite;
      z-index: 1000;
    }

    @keyframes pulso {
      0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.6); }
      70% { box-shadow: 0 0 0 18px rgba(37, 211, 102, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 22px 15px;
      margin-top: 30px;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 2rem;
      }

      .logo-container {
        width: 120px;
        height: 120px;
      }

      .logo-container img {
        width: 78px;
      }

      .card img {
        height: 240px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <img src="img2/p00.png" alt="Logo Infinity Laser">
    </div>
    <h1>Infinity Laser</h1>
    <p>Cortes y diseños personalizados en láser</
