<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería Infinity Láser MG</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f7fb;
  text-align:center;
}

h1{
  background:#0a2540;
  color:white;
  padding:20px;
  margin:0;
}

.galeria{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.galeria img{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  transition:transform 0.3s;
}

.galeria img:hover{
  transform:scale(1.05);
}
</style>

</head>

<body>

<h1>Trabajos Infinity Láser MG</h1>

<div class="galeria">

<img src="img2/p6.jpeg">
<img src="img2/p7.jpeg">
<img src="img2/p8.jpeg">
<img src="img2/p9.jpeg">
<img src="img2/p10.jpeg">
<img src="img2/p11.jpeg">
<img src="img2/p12.jpeg">
<img src="img2/p13.jpeg">
<img src="img2/p14.jpeg">
<img src="img2/p15.jpeg">

</div>

</body>
</html>
